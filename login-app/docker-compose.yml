version: '3.8'

services:

  # ─── DATABASE CONTAINER ──────────────────────────────────────
  db-101032300137:
    container_name: db-101032300137
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: RootPassword123!
      MYSQL_DATABASE: loginapp
      MYSQL_USER: appuser
      MYSQL_PASSWORD: AppPassword123!
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-pAppPassword123!"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─── WEB APP CONTAINER ───────────────────────────────────────
  web-101032300137:
    container_name: web-101032300137
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db-101032300137
      DB_USER: appuser
      DB_PASSWORD: AppPassword123!
      DB_NAME: loginapp
      SESSION_SECRET: SuperSecretSessionKey_101032300137_ChangeThis!
    ports:
      - "3000:3000"
    networks:
      - app-network
    depends_on:
      db-101032300137:
        condition: service_healthy

# ─── TAMBAHAN: phpMyAdmin ─────────────────────────────────
  phpmyadmin:
    container_name: phpmyadmin-101032300137
    image: phpmyadmin:latest
    restart: unless-stopped
    environment:
      PMA_HOST: db-101032300137
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: RootPassword123!
    ports:
      - "8080:80"
    networks:
      - app-network
    depends_on:
      db-101032300137:
        condition: service_healthy

# ─── VOLUMES & NETWORKS ──────────────────────────────────────
volumes:
  db_data:
    driver: local

networks:
  app-network:
    driver: bridge
