# ══════════════════════════════════════════════════════════════
# snort.conf — Konfigurasi Utama Snort IDS
# NIM: 101032300137
# ══════════════════════════════════════════════════════════════

# ─── STEP 1: NETWORK VARIABLES ───────────────────────────────
# HOME_NET: jaringan yang kita lindungi
# Gunakan "any" agar Snort memonitor semua traffic di container
ipvar HOME_NET any
ipvar EXTERNAL_NET any

# Variabel server (ikuti HOME_NET)
ipvar HTTP_SERVERS  $HOME_NET
ipvar SQL_SERVERS   $HOME_NET
ipvar DNS_SERVERS   $HOME_NET

# Variabel port penting
portvar HTTP_PORTS   [80,3000,8080]
portvar HTTPS_PORTS  [443,3000]
portvar SSH_PORTS    22
portvar MYSQL_PORTS  3306

# ─── STEP 2: PATH VARIABLES ──────────────────────────────────
var RULE_PATH        /etc/snort/rules
var SO_RULE_PATH     /etc/snort/so_rules
var PREPROC_RULE_PATH /etc/snort/preproc_rules
var WHITE_LIST_PATH  /etc/snort/rules
var BLACK_LIST_PATH  /etc/snort/rules

# ─── STEP 3: DECODER ─────────────────────────────────────────
config checksum_mode: none
config disable_decode_alerts

# ─── STEP 4: PREPROCESSORS ───────────────────────────────────
preprocessor frag3_global: max_frags 65536
preprocessor frag3_engine: policy windows detect_anomalies timeout 180

preprocessor stream5_global: \
    track_tcp yes, \
    track_udp yes, \
    track_icmp yes, \
    max_tcp 262144, \
    max_udp 131072

preprocessor stream5_tcp: \
    policy windows, \
    detect_anomalies, \
    require_3whs 180, \
    timeout 180, \
    ports client [22 80 443 3000 3306 8080]

preprocessor stream5_udp: timeout 180

# HTTP Inspect — penting untuk deteksi SQL Injection via HTTP
preprocessor http_inspect: global \
    iis_unicode_map unicode.map 1252 \
    compress_depth 65535 \
    decompress_depth 65535

preprocessor http_inspect_server: server default \
    http_methods { GET POST PUT DELETE OPTIONS HEAD } \
    chunk_length 500000 \
    server_flow_depth 0 \
    client_flow_depth 0 \
    post_depth 65495 \
    ports { 80 443 3000 8080 } \
    enable_cookie \
    inspect_gzip \
    u_encode yes \
    utf_8 yes \
    ascii no \
    bare_byte no \
    double_decode no \
    iis_backslash no \
    multi_slash no \
    webroot no

# ─── STEP 5: OUTPUT ──────────────────────────────────────────
# Alert ke file dan console
output alert_fast:  /var/log/snort/alert
output log_tcpdump: /var/log/snort/snort.log

# ─── STEP 6: INCLUDE RULES ───────────────────────────────────
# Local rules (WAJIB — berisi semua custom rules)
include $RULE_PATH/local.rules

# Community rules (aktifkan jika berhasil didownload)
# include $RULE_PATH/community.rules

# White & Black list
include $WHITE_LIST_PATH/white_list.rules
include $BLACK_LIST_PATH/black_list.rules
